name: Terraform Deployment Workflow

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  listing_buckets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Reposiory
        uses: actions/checkout@v6

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.IAM_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
      
      - name: Initialize Terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.BUCKET_NAME }}" \
            -backend-config="key=${{ secrets.TF_BACKEND_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=${{ secrets.TF_BACKEND_DYNAMODB_TABLE }}"
        working-directory: ./terraform

      - name: Terraform Plan
        env:
          TF_VAR_bucket_name: ${{ secrets.BUCKET_NAME }}
        run: terraform plan
        working-directory: ./terraform

      - name: Terraform Apply
        env:
          TF_VAR_bucket_name: ${{ secrets.BUCKET_NAME }}
        run: terraform apply -auto-approve
        working-directory: ./terraform

      - name: Uploading Files to S3 Bucket
        run: |
          ls -la
          aws s3 cp ./index.html s3://${{ secrets.BUCKET_NAME }}/index.html
          aws s3 cp --recursive ./images s3://${{ secrets.BUCKET_NAME }}/images/
          aws s3 cp --recursive ./styles s3://${{ secrets.BUCKET_NAME }}/styles/

      - name: List S3 Buckets
        env: 
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "Listing S3 Buckets in region $AWS_REGION"
          aws s3 ls